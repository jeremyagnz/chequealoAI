<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      @keyframes bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      .spinner-circle {
        animation: rotate 3s linear infinite;
        transform-origin: 100px 100px;
      }
      
      .spinner-handle {
        animation: rotate 3s linear infinite;
        transform-origin: 100px 100px;
      }
      
      .spinner-pulse {
        animation: pulse 2s ease-in-out infinite;
      }
      
      .spinner-glow {
        animation: bounce 1.5s ease-in-out infinite;
      }
    </style>
    
    <!-- Gradiente para la lupa -->
    <linearGradient id="goldSpinner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFED4E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradiente radial para profundidad -->
    <radialGradient id="circleShadow" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </radialGradient>
    
    <!-- Brillo exterior -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- CÍRCULO PRINCIPAL CON ROTACIÓN -->
  <g class="spinner-circle">
    <!-- Sombra del círculo -->
    <circle cx="100" cy="100" r="50" fill="none" stroke="#8B7500" stroke-width="8" opacity="0.15"/>
    
    <!-- Círculo principal con gradiente -->
    <circle cx="100" cy="100" r="50" fill="none" stroke="url(#circleShadow)" stroke-width="8"/>
    
    <!-- Reflejos brillantes (fijos en la lupa) -->
    <circle cx="82" cy="82" r="12" fill="#FFF9E6" opacity="0.6" class="spinner-pulse"/>
    <circle cx="88" cy="88" r="8" fill="#FFFAEB" opacity="0.8"/>
    <circle cx="92" cy="92" r="4" fill="#FFFFFF" opacity="1"/>
  </g>
  
  <!-- MANGO CON ROTACIÓN -->
  <g class="spinner-handle">
    <!-- Sombra del mango -->
    <line x1="136" y1="136" x2="165" y2="165" stroke="#8B7500" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
    
    <!-- Mango principal con gradiente -->
    <line x1="136" y1="136" x2="165" y2="165" stroke="url(#goldSpinner)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Reflejo en el mango -->
    <line x1="136" y1="134" x2="163" y2="161" stroke="#FFF5CC" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Punta del mango (esfera 3D) -->
    <circle cx="165" cy="165" r="6" fill="url(#goldSpinner)" class="spinner-glow"/>
    <circle cx="162" cy="162" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- ANILLO EXTERIOR GIRATORIO (efecto adicional) -->
  <g class="spinner-circle" opacity="0.5">
    <circle cx="100" cy="100" r="70" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- PUNTOS INDICADORES (4 puntos) -->
  <g class="spinner-circle">
    <circle cx="100" cy="25" r="4" fill="#D4AF37" opacity="0.8"/>
    <circle cx="175" cy="100" r="4" fill="#D4AF37" opacity="0.6"/>
    <circle cx="100" cy="175" r="4" fill="#D4AF37" opacity="0.4"/>
    <circle cx="25" cy="100" r="4" fill="#D4AF37" opacity="0.2"/>
  </g>
</svg>